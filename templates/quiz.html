<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quiz Mode</title>
    <script src="{{ url_for('static', filename='style.js') }}"></script>
</head>
<body>
    <main class="container" style="max-width: 600px;">
        <header class="header">
            <h1 class="logo">Quiz</h1>
            <p id="counter">Question 1 of {{ vocabulary|length }}</p>
        </header>

        <section class="section">
            <div id="quiz-container" style="text-align: center;">
                <h2 id="question-text" style="font-size: 28px; margin-bottom: 30px;">Word</h2>

                <div id="options-container" style="display: grid; gap: 10px;">
                    </div>

                <div id="feedback" style="margin-top: 20px; min-height: 24px; font-weight: 500;"></div>
            </div>
        </section>

        <footer class="footer">
            <button id="next-btn" class="download-button" style="display: none; margin: 0 auto;">Next Question</button>
            <br><br>
            <a href="{{ url_for('index') }}" class="posts-button">Give up</a>
        </footer>
    </main>

    <script>
        const VOCAB_DATA = {{ vocabulary | tojson }};
    </script>
    <script src="{{ url_for('static', filename='quiz.js') }}"></script>
</body>
</html>
